<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏆 ACT-I Colosseum - Tournament Brackets</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3a 50%, #0a0a1a 100%);
            min-height: 100vh;
            color: #fff;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            padding: 30px 0;
            background: linear-gradient(180deg, rgba(201,162,39,0.3) 0%, transparent 100%);
            border-bottom: 2px solid #c9a227;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2.5rem;
            color: #c9a227;
            text-shadow: 0 0 30px rgba(201,162,39,0.5);
            margin-bottom: 10px;
        }
        
        .header p {
            color: #888;
            font-size: 1.1rem;
        }
        
        /* Navigation */
        nav {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 15px;
        }
        
        nav a {
            padding: 8px 20px;
            background: rgba(201,162,39,0.1);
            border: 1px solid #444;
            border-radius: 20px;
            color: #c9a227;
            text-decoration: none;
            transition: all 0.2s;
        }
        
        nav a:hover {
            background: rgba(201,162,39,0.2);
            border-color: #c9a227;
        }
        
        nav a.active {
            background: rgba(201,162,39,0.3);
            border: 1px solid #c9a227;
            font-weight: bold;
        }
        
        /* Domain tabs */
        .domain-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 30px;
        }
        
        .domain-tab {
            padding: 10px 20px;
            background: rgba(26,39,68,0.8);
            border: 1px solid #333;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            color: #ddd;
        }
        
        .domain-tab:hover {
            border-color: #c9a227;
            transform: translateY(-2px);
        }
        
        .domain-tab.active {
            background: rgba(201,162,39,0.2);
            border-color: #c9a227;
            color: #c9a227;
        }
        
        /* Bracket visualization */
        .bracket-container {
            background: linear-gradient(145deg, #1a2744 0%, #0d1522 100%);
            border-radius: 20px;
            padding: 30px;
            border: 2px solid #333;
            overflow-x: auto;
        }
        
        .bracket-title {
            color: #c9a227;
            font-size: 1.5rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .bracket-title .emoji {
            font-size: 2rem;
        }
        
        .champion-card {
            background: linear-gradient(135deg, rgba(201,162,39,0.3) 0%, rgba(139,105,20,0.2) 100%);
            border: 2px solid #c9a227;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 0 30px rgba(201,162,39,0.2);
        }
        
        .champion-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }
        
        .champion-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #c9a227 0%, #8b6914 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
        }
        
        .champion-info h3 {
            color: #c9a227;
            font-size: 1.3rem;
        }
        
        .champion-info .stats {
            color: #888;
            font-size: 0.9rem;
        }
        
        .champion-score {
            font-size: 2rem;
            font-weight: bold;
            color: #c9a227;
            margin-left: auto;
        }
        
        .prompt-section {
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            padding: 20px;
            margin-top: 15px;
        }
        
        .prompt-section h4 {
            color: #c9a227;
            margin-bottom: 10px;
        }
        
        .prompt-text {
            color: #ddd;
            line-height: 1.6;
            font-size: 0.95rem;
            max-height: 200px;
            overflow-y: auto;
        }
        
        /* Top contenders */
        .contenders-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        
        .contender-card {
            background: rgba(26,39,68,0.6);
            border: 1px solid #333;
            border-radius: 10px;
            padding: 15px;
            transition: all 0.2s;
        }
        
        .contender-card:hover {
            border-color: #c9a227;
            transform: translateY(-3px);
        }
        
        .contender-rank {
            display: inline-block;
            background: rgba(201,162,39,0.2);
            color: #c9a227;
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 0.8rem;
            margin-bottom: 10px;
        }
        
        .contender-name {
            font-weight: bold;
            color: #fff;
            margin-bottom: 5px;
        }
        
        .contender-stats {
            color: #888;
            font-size: 0.85rem;
        }
        
        /* Family tree */
        .family-tree {
            margin-top: 30px;
            padding: 20px;
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
        }
        
        .family-tree h4 {
            color: #c9a227;
            margin-bottom: 15px;
        }
        
        .lineage {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .ancestor {
            background: rgba(26,39,68,0.8);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            border: 1px solid #444;
        }
        
        .ancestor.current {
            background: rgba(201,162,39,0.3);
            border-color: #c9a227;
            color: #c9a227;
        }
        
        .arrow {
            color: #c9a227;
        }
        
        /* Footer */
        .sisters-footer {
            text-align: center;
            padding: 30px;
            margin-top: 40px;
            border-top: 1px solid #333;
            color: #666;
        }
        
        .sisters-footer a {
            color: #c9a227;
            text-decoration: none;
        }
    </style>
</head>

        let selectedDomain = 'Influence';
        
        function renderTabs() {
            const container = document.getElementById('domainTabs');
            container.innerHTML = domains.map(d => `
                <div class="domain-tab ${d.name === selectedDomain ? 'active' : ''}" onclick="selectDomain('${d.name}')">
                    ${d.emoji} ${d.name}
                </div>
            `).join('');
        }
        
        function selectDomain(name) {
            selectedDomain = name;
            renderTabs();
            renderBracket();
        }
        
        function renderBracket() {
            const domain = domains.find(d => d.name === selectedDomain);
            const container = document.getElementById('bracketContainer');
            
            container.innerHTML = `
                <div class="bracket-title">
                    <span class="emoji">${domain.emoji}</span>
                    <span>${domain.name} Domain Championship</span>
                </div>
                
                <div class="champion-card">
                    <div class="champion-header">
                        <div class="champion-avatar">${domain.emoji}</div>
                        <div class="champion-info">
                            <h3>👑 ${domain.champion.name}</h3>
                            <div class="stats">
                                Generation ${domain.champion.generation} • 
                                ${domain.champion.wins}W / ${domain.champion.losses}L • 
                                ${((domain.champion.wins / (domain.champion.wins + domain.champion.losses)) * 100).toFixed(1)}% Win Rate
                            </div>
                        </div>
                        <div class="champion-score">${domain.champion.score.toFixed(1)}</div>
                    </div>
                    
                    <div class="prompt-section">
                        <h4>📜 Champion Prompt</h4>
                        <div class="prompt-text">${domain.champion.prompt.replace(/\n/g, '<br>')}</div>
                    </div>
                    
                    <div class="family-tree">
                        <h4>🌳 Evolution Lineage</h4>
                        <div class="lineage">
                            <span class="ancestor">Gen 1: Seed</span>
                            <span class="arrow">→</span>
                            <span class="ancestor">Gen ${Math.floor(domain.champion.generation/3)}: Early Evolution</span>
                            <span class="arrow">→</span>
                            <span class="ancestor">Gen ${Math.floor(domain.champion.generation/2)}: Mid Evolution</span>
                            <span class="arrow">→</span>
                            <span class="ancestor current">Gen ${domain.champion.generation}: ${domain.champion.name}</span>
                        </div>
                    </div>
                </div>

                            <span class="contender-rank">#${i + 2}</span>
                            <div class="contender-name">${c.name}</div>
                            <div class="contender-stats">
                                Score: ${c.score} • Gen ${c.gen} • ${c.wins}W/${c.losses}L
